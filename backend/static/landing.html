<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ogham Chat ᚛ᚑᚌᚆᚐᚋ᚜</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: monospace, sans-serif;
      background: #272A32;
      color: #DAD4C9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: #272A32;
      border: 1px solid #DAD4C9;
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
    }
    h1 { font-size: 1.75rem; margin-bottom: 0.25rem; color: #DAD4C9; }
    .ogham { font-size: 1.25rem; color: #55927F; margin-bottom: 1rem; }
    p { line-height: 1.6; margin-bottom: 1.25rem; color: #EEB24A; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    a {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 1px solid #DEADA5;
      border-radius: 6px;
      color: #5A8BDE;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    a:hover { background: #2152a5; color: #DAD4C9; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ogham Chat</h1>
    <div class="ogham">᚛ᚑᚌᚆᚐᚋ᚜</div>
    <p>Minimal in-terminal chat app</p>
    <div class="links">
      <a href="/api/v1/">API Status</a>
      <a href="/api/v1/health">Health Check</a>
      <a href="/docs">API Docs</a>
      <a href="https://github.com/jriggles/ogham-chat" target="_blank">GitHub</a>
    </div>
  </div>
</body>
</html>
