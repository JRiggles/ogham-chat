<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ogham Chat</title>
    <style>
        :root {
            color-scheme: dark;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: monospace, sans-serif;
            background: #272A32;
            color: #DAD4C9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .card {
            background: #272A32;
            border: 1px solid #DAD4C9;
            border-radius: 10px;
            max-width: 480px;
            padding: 2.5rem;
            text-align: center;
        }

        h1 {
            color: #DAD4C9;
            font-size: 1.75rem;
            margin-bottom: 0.25rem;
        }

        .ogham {
            color: #55927F;
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }

        p {
            color: #EEB24A;
            line-height: 1.6;
            margin-bottom: 1.25rem;
        }

        .links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        a {
            background: #2152a5;
            border-radius: 6px;
            color: #DAD4C9;
            display: block;
            padding: 0.5rem 1rem;
            border: 1px solid #21525A;
            font-size: 0.9rem;
            text-decoration: none;
            transition: background 0.15s;
        }

        a:hover {
            background: #DAD4C9;
            color: #5A8BDE;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Ogham Chat</h1>
        <div class="ogham">᚛ᚑᚌᚆᚐᚋ᚜</div>
        <p>Minimal in-terminal chat app</p>
        <div class="links">
            <a href="/api/v1/">API Status</a>
            <a href="/api/v1/health">Health Check</a>
            <a href="/docs">API Docs</a>
            <a href="https://github.com/jriggles/ogham-chat" target="_blank">GitHub</a>
        </div>
    </div>
</body>

</html>
